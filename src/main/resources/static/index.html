<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MyEcom</title>
  <style>
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f6f9fc, #eef3f7);
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      color: #333;
    }

    h2 {
      margin-bottom: 10px;
      font-weight: 600;
      color: #2c3e50;
    }

    .card {
      background: #fff;
      padding: 25px 30px;
      margin-top: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      width: 320px;
      text-align: center;
      transition: transform 0.2s ease-in-out;
    }

    .card:hover {
      transform: translateY(-3px);
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
      font-size: 14px;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #3498db;
    }

    button {
      background: #3498db;
      border: none;
      color: white;
      padding: 12px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      transition: background 0.2s, transform 0.2s;
      width: 100%;
      margin-top: 10px;
    }

    button:hover {
      background: #2980b9;
      transform: scale(1.02);
    }

    #output {
      margin-top: 20px;
      padding: 15px;
      background: #f4f6f8;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-family: monospace;
      text-align: left;
      white-space: pre-wrap;
      max-width: 90%;
      overflow-x: auto;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>Login</h2>
    <input id="username" placeholder="Username" value="admin">
    <input id="password" placeholder="Password" type="password" value="password">
    <button onclick="login()">MyEcom Login</button>
  </div>

  <div class="card">
    <h2>Products</h2>
    <button onclick="getProducts()">View Products</button>
  </div>

  <pre id="output"></pre>

  <script>
	async function login() {
	  const username = document.getElementById("username").value;
	  const password = document.getElementById("password").value;

	  const res = await fetch("/auth/login", {
	    method: "POST",
	    headers: { "Content-Type": "application/json" },
	    body: JSON.stringify({ username, password })
	  });

	  if (res.ok) {
	    const data = await res.json();
	    localStorage.setItem("jwt", data.token); // ✅ Save in localStorage
	    document.getElementById("output").innerText = "✅ Logged in! Token stored.";
	  } else {
	    document.getElementById("output").innerText = "❌ Login failed.";
	  }
	}


    async function getProducts() {
		const token = localStorage.getItem("jwt");
		  if (!token) {
		    document.getElementById("output").innerText = "⚠️ Please log in first.";
		    return;
		  }

		  // ✅ Simply redirect
		  window.location.href = "/products.html";
    }
  </script>
</body>
</html>
